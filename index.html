<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashes and Demons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@500;700&family=Luckiest+Guy&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!--
    Single page host. Responsibilities:
      - <canvas> is the game viewport (all gameplay rendered here).
      - Each .screen / .overlay below is a hidden DOM layer that ui.js
        toggles via class. Keep ALL chrome in the DOM, not the canvas,
        so layout/styling lives in style.css.
  -->

  <div id="game-root">
    <canvas id="game-canvas"></canvas>

    <!-- HUD: live stats drawn over the canvas (hud section of ui.js) -->
    <div id="hud" class="overlay hidden">
      <div id="hud-health"></div>
      <div id="hud-xp"></div>
      <div id="hud-level"></div>
      <div id="hud-wave"></div>
      <div id="hud-timer"></div>
      <div id="hud-kills"></div>
      <div id="hud-gold"></div>
      <!-- Unlocked-abilities sidebar (icons + stack counts, right edge) -->
      <div id="hud-abilities"></div>
      <!-- Pause: clickable/tappable; the only interactive HUD element -->
      <button id="btn-pause" aria-label="Pause">❚❚</button>
    </div>

    <!-- Start / title screen -->
    <div id="screen-start" class="screen">
      <!-- Floating embers (pure CSS; positions/timing set per-spark inline) -->
      <div class="ember-field" aria-hidden="true">
        <span class="ember" style="--x: 6%;  --s: .7;  --d: 0s;   --dur: 6s;"></span>
        <span class="ember" style="--x: 14%; --s: 1.1; --d: 2.4s; --dur: 7.5s;"></span>
        <span class="ember" style="--x: 22%; --s: .5;  --d: 1.1s; --dur: 5.2s;"></span>
        <span class="ember" style="--x: 31%; --s: .9;  --d: 3.6s; --dur: 8s;"></span>
        <span class="ember" style="--x: 39%; --s: .6;  --d: .6s;  --dur: 6.4s;"></span>
        <span class="ember" style="--x: 47%; --s: 1.3; --d: 4.2s; --dur: 9s;"></span>
        <span class="ember" style="--x: 53%; --s: .8;  --d: 1.8s; --dur: 6.8s;"></span>
        <span class="ember" style="--x: 61%; --s: .55; --d: 3.0s; --dur: 5.6s;"></span>
        <span class="ember" style="--x: 69%; --s: 1.0; --d: .3s;  --dur: 7.2s;"></span>
        <span class="ember" style="--x: 77%; --s: .7;  --d: 2.0s; --dur: 6.0s;"></span>
        <span class="ember" style="--x: 85%; --s: 1.2; --d: 4.8s; --dur: 8.4s;"></span>
        <span class="ember" style="--x: 92%; --s: .6;  --d: 1.4s; --dur: 5.8s;"></span>
        <span class="ember" style="--x: 35%; --s: .45; --d: 5.2s; --dur: 7.0s;"></span>
        <span class="ember" style="--x: 58%; --s: .5;  --d: 2.9s; --dur: 6.6s;"></span>
      </div>

      <!-- Summoning ring: two counter-rotating rune rings behind the title,
           the same ceremonial circles baked into the arena floor. -->
      <svg class="summon-ring" viewBox="0 0 200 200" aria-hidden="true">
        <g class="ring-outer">
          <circle cx="100" cy="100" r="96" fill="none" stroke="currentColor"
                  stroke-width="1.6" stroke-dasharray="7 4 2 4"/>
        </g>
        <g class="ring-inner">
          <circle cx="100" cy="100" r="74" fill="none" stroke="currentColor" stroke-width="1"/>
          <path fill="none" stroke="currentColor" stroke-width="1.4" d="
            M196 100 L174 100 M167.9 167.9 L152.3 152.3 M100 196 L100 174
            M32.1 167.9 L47.7 152.3 M4 100 L26 100 M32.1 32.1 L47.7 47.7
            M100 4 L100 26 M167.9 32.1 L152.3 47.7"/>
        </g>
      </svg>

      <!-- The demon itself: horned silhouette backlit by the lava, eyes smolder -->
      <svg class="demon" viewBox="0 0 600 300" aria-hidden="true">
        <path class="demon-body" d="
          M140 300 C160 170 240 110 300 110 C360 110 440 170 460 300 Z
          M205 165 C150 120 130 55 150 8 C160 78 190 110 238 133 Z
          M395 165 C450 120 470 55 450 8 C440 78 410 110 362 133 Z"/>
        <path class="demon-eye" d="M242 208 L288 190 L282 207 L248 218 Z"/>
        <path class="demon-eye" d="M358 208 L312 190 L318 207 L352 218 Z"/>
      </svg>

      <!-- Ghost shopkeeper: spectral merchant haunting the lower left.
           Clicking him opens the Shop (wired alongside btn-shop in ui.js). -->
      <button id="ghost-shopkeeper" title="Shop" aria-label="Open Shop">
        <svg viewBox="0 0 130 150" aria-hidden="true">
          <!-- wispy body with a ragged trailing hem -->
          <path class="ghost-body" d="M60 14 C86 14 98 38 98 64 L98 118
            Q90 106 82 118 Q74 130 66 118 Q58 106 50 118 Q42 130 34 118
            Q26 106 22 118 L22 64 C22 38 34 14 60 14 Z"/>
          <ellipse class="ghost-eye" cx="47" cy="58" rx="6" ry="9"/>
          <ellipse class="ghost-eye" cx="73" cy="58" rx="6" ry="9"/>
          <ellipse class="ghost-eye" cx="60" cy="80" rx="4.5" ry="6"/>
          <!-- stubby arm offering the coin purse -->
          <path class="ghost-body" d="M94 74 Q110 78 108 92 Q100 90 92 84 Z"/>
          <circle class="ghost-purse" cx="108" cy="104" r="11"/>
          <path class="ghost-purse-tie" d="M103 95 Q108 91 113 95"/>
        </svg>
      </button>

      <div class="title-block">
        <h1 class="game-title">Ashes and Demons</h1>
        <p class="game-tagline">Returning Light</p>
      </div>

      <nav class="main-menu">
        <button id="btn-start" class="menu-btn primary">Start Game</button>
        <button id="btn-abilities" class="menu-btn">Abilities</button>
        <button id="btn-shop" class="menu-btn">Shop</button>
        <button id="btn-leaderboard" class="menu-btn">Leaderboard</button>
        <button id="btn-settings" class="menu-btn">Settings</button>
        <!--OTHER BUTTONS TO BE ADDED-->
        <!--  <button id="btn-quit" class="menu-btn">Quit</button> -->
      </nav>

      <footer class="credits">Developed by C&J</footer>
    </div>

    <!-- Stage select (opened by Start Game; overlays the start menu).
         Stage 2 unlocks after taking the gate stair past Stage 1's boss;
         ui.js re-checks the lock each time the panel opens. -->
    <div id="screen-stage" class="screen menu-panel hidden">
      <h2>Start Game</h2>
      <button id="btn-new-game" class="menu-btn primary">New Game</button>
      <button id="btn-stage-1" class="menu-btn">Stage 1</button>
      <button id="btn-stage-2" class="menu-btn">Stage 2</button>
      <button id="btn-stage-3" class="menu-btn">Stage 3</button>
      <button id="btn-stage-back" class="menu-btn">Back</button>
    </div>

    <!-- Abilities compendium (opened from the start menu; overlays it) -->
    <div id="screen-abilities" class="screen menu-panel hidden">
      <h2>Abilities</h2>
      <div id="abilities-cards"></div>
      <button id="btn-abilities-back" class="menu-btn">Back</button>
    </div>

    <!-- Shop (opened from the start menu; overlays it). Items are built
         by ui.js from the SHOP catalog in config.js -->
    <div id="screen-shop" class="screen menu-panel hidden">
      <h2>Shop</h2>
      <p id="shop-gold"></p>
      <div id="shop-items"></div>
      <button id="btn-shop-back" class="menu-btn">Back</button>
    </div>

    <!-- Leaderboard viewer (opened from the start menu; overlays it) -->
    <div id="screen-menu-leaderboard" class="screen menu-panel hidden">
      <h2>Leaderboard</h2>
      <ol id="menu-leaderboard-list" class="leaderboard-list"></ol>
      <button id="btn-leaderboard-back" class="menu-btn">Back</button>
    </div>

    <!-- Settings (opened from the start menu; overlays it) -->
    <div id="screen-settings" class="screen menu-panel hidden">
      <h2>Settings</h2>
      <p>Character</p>
      <!-- Previews are painted by ui.js from the CHARACTERS sprite data -->
      <div class="char-row">
        <button id="btn-char-hunter" class="menu-btn char-btn">
          <canvas id="char-canvas-hunter" width="48" height="80"></canvas>Hunter
          <span class="char-desc">Balanced</span>
        </button>
        <button id="btn-char-huntress" class="menu-btn char-btn">
          <canvas id="char-canvas-huntress" width="48" height="80"></canvas>Huntress
          <span class="char-desc">Fast · frail · piercing shots</span>
        </button>
        <button id="btn-char-paladin" class="menu-btn char-btn">
          <canvas id="char-canvas-paladin" width="48" height="80"></canvas>Paladin
          <span class="char-desc">Tanky · slow · Holy Nova</span>
        </button>
      </div>
      <p id="settings-movement-label">Movement controls</p>
      <button id="btn-controls-kb" class="menu-btn">Keyboard (WASD / Arrows)</button>
      <button id="btn-controls-mouse" class="menu-btn">Mouse (follow cursor)</button>
      <p>Volume</p>
      <input id="settings-volume" class="volume-slider" type="range" min="0" max="100" aria-label="Volume" />
      <button id="btn-settings-back" class="menu-btn">Back</button>
    </div>

    <!-- Level-up modal: 3 upgrade cards, pauses the game -->
    <div id="screen-levelup" class="screen hidden">
      <h2>Choose an upgrade</h2>
      <div id="levelup-cards"></div>
    </div>

    <!-- End screen (defeat or victory) + leaderboard -->
    <div id="screen-gameover" class="screen hidden">
      <h2 id="end-title">You Died</h2>
      <p id="end-subtitle"></p>
      <div id="gameover-stats"></div>
      <input id="leaderboard-name" maxlength="12" placeholder="Name" />
      <button id="btn-save-score">Save Score</button>
      <ol id="leaderboard-list" class="leaderboard-list"></ol>
      <button id="btn-restart">Play Again</button>
      <button id="btn-exit">Exit to Menu</button>
    </div>

    <!-- Pause overlay (Esc) — run stats + acquired abilities -->
    <div id="screen-pause" class="screen hidden">
      <h2>Paused</h2>
      <div id="pause-stats"></div>
      <div id="pause-abilities"></div>
      <button id="btn-resume" class="menu-btn primary">Resume</button>
      <button id="btn-pause-controls" class="menu-btn">Movement: Keyboard</button>
      <label class="volume-row">Volume
        <input id="pause-volume" class="volume-slider" type="range" min="0" max="100" aria-label="Volume" />
      </label>
      <button id="btn-pause-quit" class="menu-btn">Quit to Menu</button>
      <p class="pause-hint">Hover an ability for details · Esc to resume</p>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
